# Data ingestion
ingestion:
  # Fetch all S&P 500 constituents dynamically from FMP API
  source: sp500
  # Benchmark symbols needed for beta, regime detection, and backtesting
  benchmark_symbols:
    - SPY
  start_years_back:
    dev: 8             # dev: 8 years (~6yr training after splits)
    prod: 20           # prod: 20 years (full history)
  # Resolved at runtime via PIPELINE_ENV (default: dev)
  end_date: null  # null = today

# Feature engineering
features:
  windows: [5, 10, 20, 50, 200]
  treasury_rates: true
  vix: true
  fundamentals: true        # key metrics + financial ratios (quarterly, forward-filled)
  sector_performance: true  # historical sector average change
  indicators:
    - sma
    - ema
    - rsi
    - macd
    - bollinger_bands
    - atr
    - volume_sma
    - stochastic
    - obv
    - mean_reversion_zscore
    - realized_volatility
    - cyclical_time
    - vix_percentile
    - relative_strength_spy
    - lagged_macros

# Feature selection (post-feature-engineering dimensionality reduction)
feature_selection:
  enabled: true
  max_null_pct: 0.90      # drop features with >90% nulls
  max_correlation: 0.95   # drop one of each pair with |corr| > 0.95
  min_variance_pct: 0.01  # drop bottom 1% by variance
  min_mutual_info: 0.001  # drop features with MI < threshold vs target (lowered to retain technical indicators)

# Feature normalization (post-selection, pre-training)
normalization:
  clip_percentiles: [1, 99]    # percentile clipping bounds for outliers
  output_stats: data/normalization_stats.json
  output_parquet: data/features_normalized.parquet

# Target — binary classification: will the stock rise >= threshold in horizon days?
target:
  horizon: 21          # trading days ahead (~1 month)
  buy_threshold: 0.025 # +2.5% → UP (1), otherwise NOT_UP (0)

# Model
model:
  type: lstm
  input_size: null  # auto-calculated from features
  hidden_size: 96
  num_layers: 2
  num_classes: 2    # NOT_UP=0, UP=1
  dropout: 0.35
  num_attention_heads: 0   # disabled to reduce overfitting
  sequence_length: 20

# Training
training:
  batch_size:
    dev: 256
    prod: 128
  max_epochs:
    dev: 10
    prod: 50
  learning_rate: 0.0005
  weight_decay: 0.05
  label_smoothing: 0.05
  focal_gamma: 2.0          # focal loss gamma (0 = standard CrossEntropy)
  noise_std: 0.02           # Gaussian noise augmentation on training inputs (matches optuna fixed_params)
  early_stopping_patience:
    dev: 3
    prod: 10
  actionable_threshold: 0.70  # min prob_up for "actionable" stock count in summaries
  precision: "32"             # "32" or "16-mixed" (MPS mixed precision)
  max_workers:
    dev: 4                    # parallel cluster training workers
    prod: 4
  per_cluster: true
  cluster_experiment_prefix: "cluster"
  # Optuna hyperparameter optimization
  optuna:
    n_trials:
      dev: 5                    # minimal trials for pipeline validation
      prod: 15                  # per-cluster search with overtuning mitigation
    n_trials_global:
      dev: 10                   # minimal global search
      prod: 10                  # balanced with per-cluster training time
    min_recall_up: 0.15         # minimum recall before penalizing objective
    epochs_per_trial:
      dev: 5                    # minimal epochs per trial
      prod: 30                  # full epochs per trial
    patience_per_trial:
      dev: 3                    # fast early stopping
      prod: 7                   # standard early stopping
    startup_trials:
      dev: 2                    # fewer warmup trials
      prod: 5                   # standard warmup
    n_symbols_per_cluster:
      dev: 2                    # minimal for pipeline validation
      prod: 3                   # ~33 symbols total, good representativity/speed balance
    convergence_patience:
      dev: 3                    # stop study if no improvement in N trials
      prod: 5
    max_overfit_gap: 0.30       # penalize trials with train_acc - val_acc > 30%
    cv_folds: 3                 # time-series CV folds per trial (overtuning mitigation)
    ensemble_top_k: 3           # train top-K configs for ensemble inference
    persist: true               # always persist studies in PostgreSQL for warm-starting
    max_history_days:
      dev: 7                    # purge trials older than 7 days in dev
      prod: 60                  # keep 60 days of history in prod for better warm-starting
    # Objective function configuration
    objective:
      metric: "precision_at_threshold"  # precision_at_threshold | f_beta
      threshold: 0.50                   # probability threshold for precision_at_threshold (lowered from 0.60 so more trials produce signals)
      beta: 0.5                         # F-beta param (only used when metric=f_beta)
      recall_penalty: "quadratic"       # quadratic | linear
    # Search space — Optuna explores these ranges (~10 tunable params)
    # Intentionally reduced to mitigate overtuning on small per-cluster datasets
    search_space:
      # Training hyperparams
      learning_rate: { low: 1.0e-4, high: 1.0e-2, log: true }
      batch_size: [64, 128, 256]
      weight_decay: { low: 1.0e-3, high: 0.2, log: true }
      label_smoothing: { low: 0.02, high: 0.12 }
      focal_gamma: { low: 0.0, high: 3.0 }
      noise_std: { low: 0.01, high: 0.08 }
      # Architecture
      hidden_size: [64, 96, 128]
      num_layers: { low: 1, high: 3 }
      dropout: { low: 0.2, high: 0.65 }
      sequence_length: [10, 20, 30]
      input_dropout: { low: 0.05, high: 0.4 }
      head_hidden_ratio: { low: 0.25, high: 0.5 }
    # Fixed params — sensible defaults not searched by Optuna
    # Reduces search space dimensionality to prevent overtuning
    fixed_params:
      optimizer_name: "adamw"
      scheduler_factor: 0.5
      scheduler_patience: 5
      gradient_clip_val: 2.0
      bidirectional: false
      num_attention_heads: 0
      activation: "gelu"
      feature_mask_rate: 0.10
  # Temporal splits (relative to today, with purge gaps)
  test_years: 1        # last 1 year = test
  val_years: 1         # 1 year before test = validation
  purge_days: 21       # gap between splits = target horizon (avoids label leakage)

# Clustering — Stage 1 (single-level global KMeans)
clustering:
  method: kmeans
  max_clusters: 10             # auto-selects optimal K in [min..max] via silhouette
  min_clusters: 3
  include_sector_features: true  # one-hot encode sector as clustering input
  pca_variance_ratio: 0.95     # PCA retains 95% of variance before clustering
  features_for_clustering:
    # Behavioral
    - return_20d_mean
    - volatility_60d
    - volume_profile
    - rsi_14_mean
    - beta_60d
    - momentum_60d
    - drawdown_max
    # Macro sensitivity
    - vix_beta
    - yield_sensitivity
    # Sector-relative
    - relative_to_sector_avg
    # Fundamentals (key metrics)
    - km_returnonequity
    - km_earningsyield
    - km_freecashflowyield
    - km_evtoebitda
    # Fundamentals (financial ratios)
    - fr_grossprofitmargin
    - fr_netprofitmargin
    - fr_debttoequityratio
    - fr_pricetoearningsratio
    - fr_pricetobookratio
    - fr_dividendyield
  min_cluster_size: 10
  output_parquet: data/clusters.parquet
  # Per-cluster buy_threshold overrides (populated after initial clustering run).
  # Keys are cluster_id strings; missing clusters use target.buy_threshold default.
  cluster_thresholds: {}
    # Example:
    # Technology-Healthcare:
    #   buy_threshold: 0.07

# Aggregation — Stage 3
aggregation:
  output_parquet: data/predictions.parquet

# Portfolio optimization — Stage 4
portfolio:
  profiles:
    aggressive:
      primary_metric: sortino
      complementary_metric: omega
      validation_metric: information
      max_positions: 25
      max_sector_weight: 0.30
      min_prob_up: 0.60            # minimum probability of UP to include in portfolio
    moderate:
      primary_metric: sharpe
      complementary_metric: calmar
      validation_metric: sortino
      max_positions: 20
      max_sector_weight: 0.25
      min_prob_up: 0.65
    conservative:
      primary_metric: calmar
      complementary_metric: sortino
      validation_metric: sharpe
      max_positions: 15
      max_sector_weight: 0.20
      min_prob_up: 0.70
  constraints:
    max_single_position: 0.10
    min_single_position: 0.01
    rebalance_frequency_days: 21
  benchmark: SPY
  output_parquet: data/portfolios.parquet

# Market regime detection — Stage 5
regime:
  benchmark: SPY
  lookback_days: 126         # 6 months of trading days
  bull_threshold: 0.10       # annualized return > 10% = bull
  bear_threshold: -0.10      # annualized return < -10% = bear
  sma_short: 50
  sma_long: 200

# Backtesting — Stage 5
backtest:
  initial_capital: 100000
  commission_pct: 0.001
  slippage_bps: 5           # 5 basis points slippage on entry/exit
  risk:
    position_stop_loss: 0.08
    position_take_profit: 0.50
    max_drawdown_limit: 0.25
    cooldown_days: 2
  output_dir: data/backtest_reports

# Model promotion — precision-focused cascading elimination
promotion:
  evaluation:
    thresholds: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80]
    primary_threshold: 0.65               # threshold for stability score and recall filters
    min_recall: 0.10                      # minimum recall at primary_threshold
    min_signals_per_window: 3             # minimum UP predictions per walk-forward window
  walk_forward:
    window_size: 63                       # 3x target horizon (trading days)
    step_size: 21                         # = target horizon (trading days)
    max_std_ratio: 0.25                   # max precision_std / precision_mean
    stability_penalty: 1.0                # score = mean - penalty * std
  ranking:
    tiebreak_margin: 0.01                 # within this margin, tiebreak by FP severity
  # Legacy fallback (used when evaluation section is absent)
  primary_metric: val_stability_score
  higher_is_better: true
  tiebreak_metrics: []
