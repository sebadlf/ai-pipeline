  start_years_back: 10  # dynamically computed as today - N years
  end_date: null  # null = today

# Feature engineering
features:
  windows: [5, 10, 20, 50, 200]
  treasury_rates: true
  vix: true
  indicators:
    - sma
    - ema
    - rsi
    - macd
    - bollinger_bands
    - atr
    - volume_sma

# Target
target:
  horizon: 63        # trading days ahead (~3 months)
  threshold: 0.03    # 3% minimum return for positive label

# Model
model:
  type: lstm
  input_size: null  # auto-calculated from features
  hidden_size: 128
  num_layers: 2
  dropout: 0.3
  sequence_length: 30

# Training
training:
  batch_size: 64
  max_epochs: 200
  learning_rate: 0.001
  weight_decay: 0.01
  label_smoothing: 0.05
  early_stopping_patience: 20
  # Temporal splits (relative to today, with purge gaps)
  test_years: 2        # last 2 years = test
  val_years: 1         # 1 year before test = validation
  purge_days: 63       # gap between splits = target horizon (avoids label leakage)

# Evaluation & Risk Management
evaluation:
  initial_capital: 100000
  commission_pct: 0.001
  confidence_threshold: 0.6
  benchmark: SPY
  # Risk management
  max_positions: 20            # max concurrent positions (equal-weight)
  position_stop_loss: 0.08     # exit position if it drops 8% from entry
  position_take_profit: 0.50   # exit position if it gains 20% from entry
  max_drawdown_limit: 0.25     # stop trading if portfolio drawdown hits 25%
  cooldown_days: 2            # days to wait after circuit breaker triggers
