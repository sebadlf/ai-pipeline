# Data ingestion
ingestion:
  # Fetch all S&P 500 constituents dynamically from FMP API
  source: sp500
  # Benchmark symbols needed for beta, regime detection, and backtesting
  benchmark_symbols:
    - SPY
  start_years_back:
    dev: 5             # dev: 5 years (~2yr training after splits)
    prod: 20           # prod: 20 years (full history)
  # In dev mode, limit to these sectors for faster iteration (null = all sectors)
  dev_sectors:
    - Technology
    - Consumer Defensive
    - Energy
  # Resolved at runtime via PIPELINE_ENV (default: dev)
  end_date: null  # null = today

# Feature engineering
features:
  windows: [5, 10, 20, 50, 200]
  treasury_rates: true
  vix: true
  fundamentals: true        # key metrics + financial ratios (quarterly, forward-filled)
  sector_performance: true  # historical sector average change
  indicators:
    - sma
    - ema
    - rsi
    - macd
    - bollinger_bands
    - atr
    - volume_sma
    - stochastic
    - obv
    - mean_reversion_zscore
    - realized_volatility
    - cyclical_time
    - vix_percentile
    - relative_strength_spy
    - lagged_macros

# Feature selection (post-feature-engineering dimensionality reduction)
feature_selection:
  enabled: true
  max_null_pct: 0.90      # drop features with >90% nulls
  max_correlation: 0.95   # drop one of each pair with |corr| > 0.95
  min_variance_pct: 0.01  # drop bottom 1% by variance

# Target — ternary classification (BUY/SELL/HOLD)
target:
  horizon: 21          # trading days ahead (~1 month)
  buy_threshold: 0.025 # +2.5% for BUY signal
  sell_threshold: 0.015 # -1.5% for SELL signal (applied as negative)

# Model
model:
  type: lstm
  input_size: null  # auto-calculated from features
  hidden_size: 128
  num_layers: 2
  num_classes: 3    # HOLD=0, BUY=1, SELL=2
  dropout: 0.3
  num_attention_heads: 4  # multi-head self-attention post-LSTM (0 to disable)
  sequence_length: 30

# Training
training:
  batch_size: 64
  max_epochs: 200
  learning_rate: 0.001
  weight_decay: 0.01
  label_smoothing: 0.05
  focal_gamma: 2.0          # focal loss gamma (0 = standard CrossEntropy)
  early_stopping_patience: 20
  per_cluster: true
  cluster_experiment_prefix: "cluster"
  # Temporal splits (relative to today, with purge gaps)
  test_years: 2        # last 2 years = test
  val_years: 1         # 1 year before test = validation
  purge_days: 21       # gap between splits = target horizon (avoids label leakage)

# Clustering — Stage 1
clustering:
  method: kmeans
  max_clusters_per_sector: 6   # auto-selects optimal K in [2..6] via silhouette
  pca_variance_ratio: 0.95     # PCA retains 95% of variance before clustering
  features_for_clustering:
    # Behavioral
    - return_20d_mean
    - volatility_60d
    - volume_profile
    - rsi_14_mean
    - beta_60d
    - momentum_60d
    - drawdown_max
    # Macro sensitivity
    - vix_beta
    - yield_sensitivity
    # Sector-relative
    - relative_to_sector_avg
    # Fundamentals (key metrics)
    - km_returnonequity
    - km_earningsyield
    - km_freecashflowyield
    - km_evtoebitda
    # Fundamentals (financial ratios)
    - fr_grossprofitmargin
    - fr_netprofitmargin
    - fr_debttoequityratio
    - fr_pricetoearningsratio
    - fr_pricetobookratio
    - fr_dividendyield
  min_cluster_size: 3
  output_parquet: data/clusters.parquet
  # Per-cluster threshold overrides (populated after initial clustering run).
  # Keys are cluster_id strings; missing clusters use target defaults.
  cluster_thresholds: {}
    # Example:
    # Technology_0:
    #   buy_threshold: 0.07
    #   sell_threshold: 0.04

# Aggregation — Stage 3
aggregation:
  output_parquet: data/predictions.parquet

# Portfolio optimization — Stage 4
portfolio:
  profiles:
    aggressive:
      primary_metric: sortino
      complementary_metric: omega
      validation_metric: information
      max_positions: 25
      max_sector_weight: 0.30
      min_confidence: 0.50
      allow_short: true
    moderate:
      primary_metric: sharpe
      complementary_metric: calmar
      validation_metric: sortino
      max_positions: 20
      max_sector_weight: 0.25
      min_confidence: 0.55
      allow_short: false
    conservative:
      primary_metric: calmar
      complementary_metric: sortino
      validation_metric: sharpe
      max_positions: 15
      max_sector_weight: 0.20
      min_confidence: 0.60
      allow_short: false
  constraints:
    max_single_position: 0.10
    min_single_position: 0.01
    rebalance_frequency_days: 21
  benchmark: SPY
  output_parquet: data/portfolios.parquet

# Market regime detection — Stage 5
regime:
  benchmark: SPY
  lookback_days: 126         # 6 months of trading days
  bull_threshold: 0.10       # annualized return > 10% = bull
  bear_threshold: -0.10      # annualized return < -10% = bear
  sma_short: 50
  sma_long: 200

# Backtesting — Stage 5
backtest:
  initial_capital: 100000
  commission_pct: 0.001
  slippage_bps: 5           # 5 basis points slippage on entry/exit
  risk:
    position_stop_loss: 0.08
    position_take_profit: 0.50
    max_drawdown_limit: 0.25
    cooldown_days: 2
  output_dir: data/backtest_reports

# Model promotion — champion selection criteria
promotion:
  primary_metric: val_trade_sortino       # main metric for candidate vs champion comparison
  higher_is_better: true
  tiebreak_metrics:                       # ordered list; used when primary is tied
    - val_trade_sharpe
    - val_trade_calmar
  # Guards — candidate must pass ALL to be eligible
  min_val_trade_num_trades: 1             # reject if backtest had fewer trades (0 = disabled)
  max_val_trade_max_drawdown: -0.80       # reject if drawdown worse than this (more negative = worse)
  # Legacy fallback: if val_trade_* metrics are missing (old runs), use val_acc instead
  legacy_fallback_to_val_acc: true
