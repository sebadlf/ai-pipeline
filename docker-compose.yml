services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - ml-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: trading-mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: mlflow-artifacts:/mlruns
      # MLflow 3.5+ validates Host headers (DNS rebinding). Default * allows any Host; set explicit
      # hosts in .env for production (e.g. my-mac.local,203.0.113.10,localhost:*).
      MLFLOW_SERVER_ALLOWED_HOSTS: ${MLFLOW_SERVER_ALLOWED_HOSTS:-*}
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: ${MLFLOW_SERVER_CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/mlflow
      --default-artifact-root mlflow-artifacts:/mlruns
      --artifacts-destination /mlruns
      --serve-artifacts"
    networks:
      - ml-network

networks:
  ml-network:
    name: ml-network
